<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Simulasi Mobi  - Grafika Komputer</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; background-color: #228B22; touch-action: none; }
        
        /* UI Atas 
        #ui-container { position: absolute; top: 10px; left: 10px; z-index: 10; }
        .btn-atas { padding: 8px 12px; margin-right: 5px; cursor: pointer; font-weight: bold; background: #fff; border: 2px solid #333; border-radius: 5px; font-size: 12px; }
        .btn-atas:active { background: #ccc; }
        
        #instruksi { color: white; background: rgba(0,0,0,0.8); padding: 10px; margin-top: 10px; border-radius: 5px; line-height: 1.4; font-size: 12px; max-width: 280px; }

        /* UI Bawah 
        #mobile-controls { position: absolute; bottom: 20px; left: 0; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; z-index: 10; }
        .btn-kendali { padding: 15px 30px; font-size: 18px; font-weight: bold; background-color: rgba(255, 255, 255, 0.8); border: 3px solid #333; border-radius: 10px; user-select: none; -webkit-user-select: none; }
        .btn-kendali:active { background-color: rgba(200, 200, 200, 1); }
    </style>
</head>
<body>

    <div id="ui-container">
        <button id="btn-warna" class="btn-atas">Ganti Warna</button>
        <button id="btn-reset" class="btn-atas">Reset</button>
        <div id="instruksi">
            <strong>CARA BERMAIN (PC & HP):</strong><br>
            • <strong>Gas/Rem:</strong> Tahan tombol (atau A/D di PC).<br>
            • <strong>Interaksi:</strong> Klik langit untuk mengubah ukuran mobil!
        </div>
    </div>

    <div id="mobile-controls">
        <button id="btn-mundur" class="btn-kendali">◀ MUNDUR</button>
        <button id="btn-maju" class="btn-kendali">MAJU ▶</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        //  SCENE
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x228B22); 
        scene.fog = new THREE.Fog(0x228B22, 10, 60); 

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 4, 12); 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        //  PENCAHAYAAN
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(10, 15, 10); 
        scene.add(dirLight);

        // TEKSTUR JALAN
        const textureWidth = 512, textureHeight = 256;
        const canvas = document.createElement('canvas');
        canvas.width = textureWidth; canvas.height = textureHeight;
        const ctx = canvas.getContext('2d');

        ctx.fillStyle = '#333333';
        ctx.fillRect(0, 0, textureWidth, textureHeight);
        for(let i=0; i<5000; i++) {
            ctx.fillStyle = `rgba(0,0,0,${Math.random()*0.15})`;
            ctx.fillRect(Math.random()*textureWidth, Math.random()*textureHeight, 2, 2);
        }
        ctx.fillStyle = '#ffffff'; 
        for(let x = 0; x < textureWidth * 2; x += 100 + 150) {
             ctx.fillRect(x - textureWidth/2, (textureHeight - 10) / 2, 100, 10);
        }

        const roadTexture = new THREE.CanvasTexture(canvas);
        roadTexture.wrapS = THREE.RepeatWrapping; 
        roadTexture.wrapT = THREE.RepeatWrapping; 
        roadTexture.repeat.set(50, 1); 

        const roadGeometry = new THREE.PlaneGeometry(200, 10);
        roadGeometry.rotateX(-Math.PI / 2);
        const roadMaterial = new THREE.MeshStandardMaterial({ map: roadTexture, color: 0xffffff }); 
        const road = new THREE.Mesh(roadGeometry, roadMaterial);
        road.position.y = -0.01; 
        scene.add(road);

        //  MOBIL
        const carGroup = new THREE.Group();

        const bodyGeo = new THREE.BoxGeometry(2.5, 0.8, 1.2);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0xcc0000 });
        const carBody = new THREE.Mesh(bodyGeo, bodyMat);
        carBody.position.y = 0.8;
        carGroup.add(carBody);

        const roofGeo = new THREE.BoxGeometry(1.2, 0.6, 1);
        const roofMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        const carRoof = new THREE.Mesh(roofGeo, roofMat);
        carRoof.position.set(-0.2, 1.5, 0);
        carGroup.add(carRoof);

        const wheels = [];
        function createWheel() {
            const wheelGroup = new THREE.Group();
            const tireGeo = new THREE.CylinderGeometry(0.4, 0.4, 0.25, 24);
            tireGeo.rotateX(Math.PI / 2);
            const tireMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
            wheelGroup.add(new THREE.Mesh(tireGeo, tireMat));

            const rimGeo = new THREE.CylinderGeometry(0.25, 0.25, 0.27, 16);
            rimGeo.rotateX(Math.PI / 2);
            const rimMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa });
            wheelGroup.add(new THREE.Mesh(rimGeo, rimMat));

            const spokeGeo = new THREE.BoxGeometry(0.45, 0.08, 0.3);
            const spokeMat = new THREE.MeshStandardMaterial({ color: 0xdddddd });
            const spoke1 = new THREE.Mesh(spokeGeo, spokeMat);
            const spoke2 = new THREE.Mesh(spokeGeo, spokeMat);
            spoke2.rotation.z = Math.PI / 2; 
            wheelGroup.add(spoke1);
            wheelGroup.add(spoke2);

            return wheelGroup;
        }

        const wheelPositions = [
            [-0.8, 0.4, 0.65], [0.8, 0.4, 0.65], 
            [-0.8, 0.4, -0.65], [0.8, 0.4, -0.65] 
        ];

        wheelPositions.forEach(pos => {
            const wheel = createWheel();
            wheel.position.set(pos[0], pos[1], pos[2]);
            carGroup.add(wheel);
            wheels.push(wheel); 
        });

        scene.add(carGroup);

        // KONTROL
        let speed = 0;
        let isScaledUp = false;
        const keys = { d: false, a: false };

        
        // Kontrol (PC)
        document.addEventListener('keydown', (e) => {
            if(e.key.toLowerCase() === 'd' || e.key === 'ArrowRight') keys.d = true;
            if(e.key.toLowerCase() === 'a' || e.key === 'ArrowLeft') keys.a = true;
        });
        document.addEventListener('keyup', (e) => {
            if(e.key.toLowerCase() === 'd' || e.key === 'ArrowRight') keys.d = false;
            if(e.key.toLowerCase() === 'a' || e.key === 'ArrowLeft') keys.a = false;
        });

        //  Kontrol Layar Sentuh / Mouse Hold (HP/PC)
        const btnMaju = document.getElementById('btn-maju');
        const btnMundur = document.getElementById('btn-mundur');

        // pointer events 
        btnMaju.addEventListener('pointerdown', (e) => { keys.d = true; e.preventDefault(); });
        btnMaju.addEventListener('pointerup', (e) => { keys.d = false; });
        btnMaju.addEventListener('pointerleave', (e) => { keys.d = false; }); // Jika jempol tergeser

        btnMundur.addEventListener('pointerdown', (e) => { keys.a = true; e.preventDefault(); });
        btnMundur.addEventListener('pointerup', (e) => { keys.a = false; });
        btnMundur.addEventListener('pointerleave', (e) => { keys.a = false; });

        // Tombol
        document.getElementById('btn-warna').addEventListener('click', () => {
            carBody.material.color.setHex(Math.random() * 0xffffff);
        });
        document.getElementById('btn-reset').addEventListener('click', () => {
            carGroup.position.x = 0;
            speed = 0;
        });

        // Click (Skala)
        window.addEventListener('pointerdown', (e) => {
            // Abaikan tombol HTML
            if(e.target.tagName === 'BUTTON' || e.target.closest('#mobile-controls') || e.target.closest('#ui-container')) return; 
            
            if (isScaledUp) carGroup.scale.set(1, 1, 1); 
            else carGroup.scale.set(1.3, 1.3, 1.3); 
            isScaledUp = !isScaledUp;
        });

        // Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ANIMASI UTAMA
        function animate() {
            requestAnimationFrame(animate);

            if (keys.d) speed += 0.005; 
            else if (keys.a) speed -= 0.005; 
            else speed *= 0.9; 
            speed = Math.max(-0.4, Math.min(0.4, speed));
            
            carGroup.position.x += speed;
            camera.position.x = carGroup.position.x;

            road.position.x = carGroup.position.x;
            roadTexture.offset.x = carGroup.position.x / 4; 

            wheels.forEach(wheel => {
                wheel.rotation.z -= speed * 1.5;
            });

            renderer.render(scene, camera);
        }
        
        animate();
    </script>
</body>
</html>
